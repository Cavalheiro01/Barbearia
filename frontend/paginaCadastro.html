<div class="container-cadastro">

    <h1>Criar Conta</h1>

    <form id="formCadastro">
        <label for="nome">Nome Completo</label>
        <input
            type="text"
            id="nome"
            name="nome"
            required
        >

        <label for="cpf">CPF</label>
        <input
            type="text"
            id="cpf"
            name="cpf"
            required
        >

        <label for="email">E-mail</label>
        <input
            type="email"
            id="email"
            name="email"
            required
        >

        <label for="senha">Senha</label>
        <input
            type="password"
            id="senha"
            name="senha"
            required
        >

        <label for="confirmarSenha">Confirmar Senha</label>
        <input
            type="password"
            id="confirmarSenha"
            name="confirmarSenha"
            required
        >

        <button type="submit" id="btnCadastrar">
            Cadastrar
        </button>

        <button type="button" id="btnVoltar">
            Voltar
        </button>

    </form>

</div>

<script type="module" src="/frontend/script/main.js"></script>
